[project]
name = "pisceslx"
version = "1.0.0"
backend = "piscesl1"
description = "PiscesLx LLM Training Project"
author = ""
first_launch = false

[project.commands]
enabled = ["train", "inference", "benchmark", "download"]

[paths]
root = "."
models = ".pisceslx/models"
checkpoints = ".pisceslx/checkpoints"
data = ".pisceslx/data"
outputs = ".pisceslx/outputs"
logs = ".pisceslx/logs"
cache = ".pisceslx/cache"
temp = ".pisceslx/temp"
configs = "configs"
runs = ".pisceslx/runs"

[paths.run_files]
spec = "spec.json"
state = "state.json"
events = "events.jsonl"
metrics = "metrics.jsonl"
control = "control.jsonl"
stdout = "stdout.log"
artifacts = "artifacts.json"
lock = ".lock"

[api]
host = "127.0.0.1"
port = 3140
cors_origins = ["http://localhost:3000"]
timeout = 120
max_workers = 4

[api.handshake]
enabled = true
timeout = 5

[ui]
theme = "system"
language = "en"
sidebar_collapsed = false

[notifications]
enabled = true
retention_days = 30
max_count = 1000
sound = false

[environment]
python_path = "python"
cuda_required = false
cuda_version = ""

[environment.virtualenv]
enabled = false
path = ".venv"
create_if_missing = false

[[environment.requirements]]
name = "main"
path = "requirements.txt"
required = true
