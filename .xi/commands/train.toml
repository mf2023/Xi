default = true
tab = "fp4"

[[train.schema.parameters]]
name = "fp4_master_weights_dtype"
type = "select"
description = "FP4 master weights data type"
required = false
default = "fp32"
options = ["fp32", "fp16", "bf16"]
tab = "fp4"

[[train.schema.parameters]]
name = "batch_size"
type = "integer"
description = "Batch size for training"
required = false
default = 32
min = 1
max = 1024
tab = "data"

[[train.schema.parameters]]
name = "gradient_accumulation_steps"
type = "integer"
description = "Gradient accumulation steps"
required = false
default = 1
min = 1
max = 128
tab = "data"

[[train.schema.parameters]]
name = "num_workers"
type = "integer"
description = "Number of data loading workers"
required = false
default = 4
min = 0
max = 32
tab = "data"

[[train.schema.parameters]]
name = "pin_memory"
type = "boolean"
description = "Pin memory in DataLoader for faster GPU transfer"
required = false
default = true
tab = "data"

[[train.schema.parameters]]
name = "prefetch_factor"
type = "integer"
