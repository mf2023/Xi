[train]
executable = "python"
script = "manage.py"
args = ["train"]
env = { CUDA_VISIBLE_DEVICES = "0" }
cwd = "${paths.root}"
timeout = 86400
background = true
enable_action = true

[train.defaults]
model_size = "7B"
dataset = ""
train_mode = "standard"
seq_len = 2048

[train.schema]
description = "Train a PiscesL1 model with specified configuration"

[[train.schema.parameters]]
name = "model_size"
type = "select"
description = "Model size configuration"
required = true
default = "7B"
source = "${paths.configs}/model"
source_type = "directory"
tab = "basic"

[[train.schema.parameters]]
name = "dataset"
type = "string"
description = "Dataset name or path for training"
required = false
default = ""
tab = "basic"

[[train.schema.parameters]]
name = "train_mode"
type = "select"
description = "Training mode: standard, quant_export, or preference"
required = false
default = "standard"
options = ["standard", "quant_export", "preference"]
tab = "basic"

[[train.schema.parameters]]
name = "stage"
type = "select"
description = "Training stage: pretrain, sft, alignment_dpo, alignment_ppo, alignment_orpo, specialized"
required = false
default = "auto"
options = ["auto", "pretrain", "continued_pretrain", "sft", "alignment_dpo", "alignment_ppo", "alignment_orpo", "specialized"]
tab = "basic"

[[train.schema.parameters]]
name = "train_config"
type = "path"
description = "Training config file path (JSON/YAML)"
required = false
default = ""
tab = "basic"

[[train.schema.parameters]]
name = "seq_len"
type = "integer"
description = "Sequence length for training"
required = false
default = 2048
min = 64
max = 1048576
tab = "basic"

[[train.schema.parameters]]
name = "model_path"
type = "path"
description = "Model path for preference training"
required = false
default = ""
tab = "basic"

[[train.schema.parameters]]
name = "resume_ckpt"
type = "path"
description = "Path to checkpoint to resume training"
required = false
default = ""
tab = "basic"

[[train.schema.parameters]]
name = "reset_lr"
type = "boolean"
description = "Reset learning rate after resuming"
required = false
default = false
tab = "basic"

[[train.schema.parameters]]
name = "quant"
type = "boolean"
description = "Force enable 4-bit quantization"
required = false
default = false
tab = "quant"

[[train.schema.parameters]]
name = "no_quant"
type = "boolean"
description = "Force disable quantization"
required = false
default = false
tab = "quant"

[[train.schema.parameters]]
name = "force_quant"
type = "boolean"
description = "Override config to force quantization"
required = false
default = false
tab = "quant"

[[train.schema.parameters]]
name = "force_lora"
type = "boolean"
description = "Override config to force LoRA"
required = false
default = false
tab = "quant"

[[train.schema.parameters]]
name = "quant_bits"
type = "select"
description = "Quantization bits"
required = false
default = "4"
options = ["2", "4", "8"]
tab = "quant"

[[train.schema.parameters]]
name = "quant_method"
type = "select"
description = "Quantization method: nf4, int4, int8, fp8"
required = false
default = "nf4"
options = ["nf4", "int4", "int8", "fp8"]
tab = "quant"

[[train.schema.parameters]]
name = "quant_group_size"
type = "integer"
description = "Group size for grouped quantization"
required = false
default = 128
min = 32
max = 512
tab = "quant"

[[train.schema.parameters]]
name = "enable_fp8_linear"
type = "boolean"
description = "Enable FP8 linear layers (requires Hopper GPU)"
required = false
default = false
tab = "quant"

[[train.schema.parameters]]
name = "rlhf"
type = "boolean"
description = "Enable RLHF training"
required = false
default = false
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_dataset"
type = "path"
description = "RLHF human feedback dataset"
required = false
default = ""
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_lr"
type = "float"
description = "RLHF learning rate"
required = false
default = 1e-5
min = 0.0
max = 1.0
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_batch_size"
type = "integer"
description = "RLHF batch size"
required = false
default = 16
min = 1
max = 1024
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_mini_batch_size"
type = "integer"
description = "RLHF mini-batch size for PPO"
required = false
default = 4
min = 1
max = 256
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_accum_steps"
type = "integer"
description = "RLHF gradient accumulation steps"
required = false
default = 1
min = 1
max = 128
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_epochs"
type = "integer"
description = "RLHF training epochs"
required = false
default = 1
min = 1
max = 100
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_max_samples"
type = "integer"
description = "RLHF maximum samples"
required = false
default = 10000
min = 1
max = 10000000
tab = "rlhf"

[[train.schema.parameters]]
name = "rlhf_max_length"
type = "integer"
description = "RLHF maximum sequence length"
required = false
default = 512
min = 64
max = 1048576
tab = "rlhf"

[[train.schema.parameters]]
name = "learning_rate"
type = "float"
description = "Learning rate for optimizer"
required = false
default = 1e-4
min = 0.0
max = 1.0
tab = "optimizer"

[[train.schema.parameters]]
name = "weight_decay"
type = "float"
description = "Weight decay (L2 regularization)"
required = false
default = 0.01
min = 0.0
max = 1.0
tab = "optimizer"

[[train.schema.parameters]]
name = "max_grad_norm"
type = "float"
description = "Maximum gradient norm for clipping"
required = false
default = 1.0
min = 0.0
max = 100.0
tab = "optimizer"

[[train.schema.parameters]]
name = "optimizer_name"
type = "select"
description = "Optimizer name"
required = false
default = "adamw"
options = ["adamw", "adamw8bit", "sgd", "lion", "sophia"]
tab = "optimizer"

[[train.schema.parameters]]
name = "use_galore"
type = "boolean"
description = "Enable GaLore memory-efficient training"
required = false
default = false
tab = "galore"

[[train.schema.parameters]]
name = "galore_rank"
type = "integer"
description = "GaLore rank for low-rank projection"
required = false
default = 128
min = 32
max = 1024
tab = "galore"

[[train.schema.parameters]]
name = "galore_update_proj_gap"
type = "integer"
description = "Steps between projection matrix updates"
required = false
default = 200
min = 50
max = 1000
tab = "galore"

[[train.schema.parameters]]
name = "galore_quantization_bits"
type = "integer"
description = "GaLore quantization bits for memory efficiency"
required = false
default = 8
min = 4
max = 8
tab = "galore"

[[train.schema.parameters]]
name = "galore_lr_ratio"
type = "float"
description = "GaLore learning rate ratio"
required = false
default = 1.0
min = 0.1
max = 10.0
tab = "galore"

[[train.schema.parameters]]
name = "galore_min_rank"
type = "integer"
description = "GaLore minimum rank for adaptive rank"
required = false
default = 32
min = 8
max = 256
tab = "galore"

[[train.schema.parameters]]
name = "galore_max_rank"
type = "integer"
description = "GaLore maximum rank for adaptive rank"
required = false
default = 512
min = 64
max = 2048
tab = "galore"

[[train.schema.parameters]]
name = "galore_rank_adapt_interval"
type = "integer"
description = "GaLore rank adaptation interval"
required = false
default = 1000
min = 100
max = 10000
tab = "galore"

[[train.schema.parameters]]
name = "galore_memory_efficient"
type = "boolean"
description = "Enable GaLore memory-efficient mode"
required = false
default = false
tab = "galore"

[[train.schema.parameters]]
name = "use_fp4"
