# Run Types Configuration
# This file defines all available run types that can be created from the UI.

[[run_types]]
name = "train"
label = "Training"
description = "Train and fine-tune models"
icon = "Brain"
color = "#3B82F6"
enabled = true
order = 1

[[run_types]]
name = "inference"
label = "Inference"
description = "Start inference server"
icon = "MessageSquare"
color = "#10B981"
enabled = true
order = 2

[[run_types]]
name = "benchmark"
label = "Benchmark"
description = "Run performance benchmarks"
icon = "Gauge"
color = "#F59E0B"
enabled = true
order = 3

[[run_types]]
name = "download"
label = "Download"
description = "Download models and datasets"
icon = "Download"
color = "#8B5CF6"
enabled = true
order = 4

[[run_types]]
name = "install"
label = "Install"
description = "Install dependencies"
icon = "Package"
color = "#6B7280"
enabled = true
order = 5
