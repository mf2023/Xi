[inference]
executable = "python"
script = "manage.py"
args = ["serve"]
env = {}
cwd = "${paths.root}"
timeout = 60
background = true

[inference.defaults]
host = "127.0.0.1"
port = 8000
max_length = 2048
temperature = 0.7
top_p = 0.9
